<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MASK TEAM - داشبۆرد</title>
<link rel="icon" type="image/svg+xml" href="/images/Mask.svg">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:30px}
.stat-card{background:rgba(26,26,40,0.7);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.stat-card .num{font-family:var(--font-display);font-size:2rem;font-weight:900}
.stat-card .lbl{color:var(--text-secondary);font-size:0.8rem;margin-top:5px}
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:0.85rem;transition:all .3s}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,215,0,0.08)}
.player-table{width:100%;border-collapse:collapse;background:rgba(26,26,40,0.6);border-radius:12px;overflow:hidden}
.player-table th{padding:12px 15px;text-align:right;background:rgba(0,0,0,0.3);color:var(--text-secondary);font-size:0.8rem;font-weight:700;border-bottom:1px solid var(--border)}
.player-table td{padding:10px 15px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.9rem}
.player-table tr:hover{background:rgba(255,255,255,0.02)}
.status-badge{padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:700}
.s-pending{background:rgba(255,193,7,0.15);color:#ffc107}
.s-reviewed{background:rgba(13,202,240,0.15);color:#0dcaf0}
.s-accepted{background:rgba(25,135,84,0.15);color:#198754}
.s-rejected{background:rgba(220,53,69,0.15);color:#dc3545}
.admin-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;margin-bottom:25px}
.admin-header h2{margin:0}
</style>
</head>
<body>
<div id="canvas-container"></div>
<nav class="navbar"><div class="nav-container"><a href="/" class="nav-logo"><img src="/images/Mask.svg" alt="MASK TEAM"></a><ul class="nav-links"><li><a href="/">ماڵەوە</a></li><li><a href="/apply">داواکاری</a></li><li><a href="/calculate">حسابکەر</a></li><li><a href="/videos">ڤیدیۆ</a></li><li><a href="/staff">ستاف</a></li><li><a href="/login" class="nav-cta">چوونەژوورەوە</a></li></ul><button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button></div></nav>
<div class="nav-overlay" id="navOverlay"></div>
<div class="page-wrapper">
  <div class="section-header" style="padding-top:30px">
    <div class="admin-header">
      <div><h1>داشبۆردی <span class="accent">ئەدمین</span></h1><p style="color:var(--text-secondary);margin:5px 0 0;font-size:0.85rem" id="adminName"></p></div>
      <div style="display:flex;gap:10px">
        <a href="/dashboard/tournaments" class="btn btn-secondary tilt-3d" style="font-size:0.85rem">🏆 تورنمنتەکان</a>
        <a href="/api/logout" class="btn btn-secondary tilt-3d" style="font-size:0.85rem;background:rgba(220,53,69,0.15);border-color:rgba(220,53,69,0.3)">دەرچوون</a>
      </div>
    </div>
    <div class="stat-grid" id="stats"></div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-status="all" onclick="filterPlayers('all')">هەموو</button>
      <button class="filter-btn" data-status="pending" onclick="filterPlayers('pending')">چاوەڕوانی</button>
      <button class="filter-btn" data-status="reviewed" onclick="filterPlayers('reviewed')">پێداچوونەوە</button>
      <button class="filter-btn" data-status="accepted" onclick="filterPlayers('accepted')">قبوڵ کراو</button>
      <button class="filter-btn" data-status="rejected" onclick="filterPlayers('rejected')">ڕەت کراو</button>
    </div>
    <div style="overflow-x:auto;border-radius:12px;border:1px solid var(--border)">
      <table class="player-table"><thead><tr><th>ناو</th><th>ئیمەیل</th><th>IGN</th><th>ڕۆڵ</th><th>بارودۆخ</th><th>ڕێکەوت</th></tr></thead><tbody id="playersBody"></tbody></table>
    </div>
  </div>
</div>
<footer class="footer"><p>© 2026 MASK TEAM</p></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/js/main.js"></script>
<script>
let currentStatus = 'all';
async function loadData() {
  try {
    // Check session first
    const s = await (await fetch('/api/session')).json();
    if (!s.loggedIn) { window.location.href = '/login'; return; }
    document.getElementById('adminName').textContent = 'بەخێربێیت، ' + s.name;
    const r = await fetch('/api/players?status=' + currentStatus);
    const d = await r.json();
    renderStats(d.counts);
    renderPlayers(d.players);
  } catch { window.location.href = '/login'; }
}
function renderStats(c) {
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num" style="color:#ffc107">${c.pending}</div><div class="lbl">چاوەڕوانی</div></div>
    <div class="stat-card"><div class="num" style="color:#0dcaf0">${c.reviewed}</div><div class="lbl">پێداچوونەوە</div></div>
    <div class="stat-card"><div class="num" style="color:#198754">${c.accepted}</div><div class="lbl">قبوڵ کراو</div></div>
    <div class="stat-card"><div class="num" style="color:#dc3545">${c.rejected}</div><div class="lbl">ڕەت کراو</div></div>
    <div class="stat-card"><div class="num" style="color:var(--accent)">${c.total}</div><div class="lbl">گشتی</div></div>`;
}
function renderPlayers(players) {
  const tbody = document.getElementById('playersBody');
  if (players.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-secondary)">هیچ داواکارییەک نییە</td></tr>'; return; }
  tbody.innerHTML = players.map(p => `<tr onclick="window.location.href='/dashboard/player/${p.id}'" style="cursor:pointer">
    <td><strong>${p.name}</strong></td>
    <td style="color:var(--text-secondary);font-size:0.85rem">${p.email}</td>
    <td>${p.ign}</td>
    <td style="color:var(--text-secondary);font-size:0.85rem">${p.role}</td>
    <td><span class="status-badge s-${p.status}">${p.status === 'pending' ? 'چاوەڕوانی' : p.status === 'reviewed' ? 'پێداچوونەوە' : p.status === 'accepted' ? 'قبوڵ کراو' : 'ڕەت کراو'}</span></td>
    <td style="color:var(--text-secondary);font-size:0.8rem">${new Date(p.created_at).toLocaleDateString('ku')}</td></tr>`).join('');
}
function filterPlayers(s) { currentStatus = s; document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.status === s)); loadData(); }
loadData();
</script>
</body>
</html>
