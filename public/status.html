<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MASK TEAM PUBG - باری داواکاری</title>
<link rel="icon" type="image/svg+xml" href="/images/Mask.svg">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.status-box{max-width:550px;margin:40px auto;padding:30px;background:rgba(26,26,40,0.8);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(10px)}
.status-box input{width:100%;padding:12px 15px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:#fff;font-family:inherit;font-size:0.95rem}
.status-box input:focus{outline:none;border-color:var(--accent)}
.player-info{background:rgba(0,0,0,0.2);border-radius:12px;padding:20px;margin-top:20px;display:none}
.player-info h3{margin-bottom:12px;font-family:var(--font-display)}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.9rem}
.info-row:last-child{border:0}
.info-row span:first-child{color:var(--text-secondary)}
.status-badge{padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:700}
.status-badge.pending{background:rgba(255,193,7,0.2);color:#ffc107}
.status-badge.reviewed{background:rgba(13,202,240,0.2);color:#0dcaf0}
.status-badge.accepted{background:rgba(25,135,84,0.2);color:#198754}
.status-badge.rejected{background:rgba(220,53,69,0.2);color:#dc3545}
.replies{margin-top:20px;display:none}
.reply-card{background:rgba(0,0,0,0.15);border-radius:10px;padding:15px;margin-bottom:10px}
.reply-card .admin{color:var(--accent);font-weight:700;font-size:0.85rem}
.reply-card .date{color:var(--text-secondary);font-size:0.75rem;float:left}
.reply-card .msg{margin-top:8px;font-size:0.9rem}
</style>
</head>
<body>
<div id="canvas-container"></div>
<nav class="navbar"><div class="nav-container"><a href="/" class="nav-logo"><img src="/images/Mask.svg" alt="MASK TEAM"></a><ul class="nav-links"><li><a href="/">ماڵەوە</a></li><li><a href="/apply">داواکاری</a></li><li><a href="/calculate">حسابکەر</a></li><li><a href="/videos">ڤیدیۆ</a></li><li><a href="/staff">ستاف</a></li><li><a href="/status">باری داواکاری</a></li><li><a href="/login" class="nav-cta">چوونەژوورەوە</a></li></ul><button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button></div></nav>
<div class="nav-overlay" id="navOverlay"></div>
<div class="page-wrapper">
  <div class="section-header" style="padding-top:40px"><h1>باری <span class="accent">داواکاری</span></h1><p>بە ئیمەیلەکەت بارودۆخی داواکارییەکەت ببینە</p></div>
  <div class="status-box">
    <form id="statusForm" style="display:flex;gap:10px">
      <input type="email" name="email" placeholder="ئیمەیلەکەت بنووسە..." required style="flex:1">
      <button type="submit" class="btn btn-primary tilt-3d">گەڕان</button>
    </form>
    <div class="player-info" id="playerInfo">
      <h3 id="playerName"></h3>
      <div class="info-row"><span>IGN</span><span id="playerIgn"></span></div>
      <div class="info-row"><span>ڕۆڵ</span><span id="playerRole"></span></div>
      <div class="info-row"><span>تایبەتمەندی</span><span id="playerTier"></span></div>
      <div class="info-row"><span>بارودۆخ</span><span id="playerStatus"></span></div>
      <div class="info-row"><span>ڕێکەوتی ناردن</span><span id="playerDate"></span></div>
    </div>
    <div class="replies" id="repliesSection"><h4 style="margin-bottom:12px;color:var(--text-secondary)">وەڵامەکان</h4><div id="repliesList"></div></div>
    <p id="noResult" style="text-align:center;color:var(--text-secondary);margin-top:20px;display:none">هیچ داواکارییەک نەدۆزرایەوە بۆ ئەم ئیمەیلە</p>
  </div>
</div>
<footer class="footer"><p>© 2026 MASK TEAM</p></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/js/main.js"></script>
<script>
document.getElementById('statusForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = this.email.value;
  try {
    const r = await fetch('/api/status?email=' + encodeURIComponent(email));
    const d = await r.json();
    const pi = document.getElementById('playerInfo');
    const rs = document.getElementById('repliesSection');
    const nr = document.getElementById('noResult');
    if (d.player) {
      pi.style.display = 'block';
      document.getElementById('playerName').textContent = d.player.name;
      document.getElementById('playerIgn').textContent = d.player.ign;
      document.getElementById('playerRole').textContent = d.player.role;
      document.getElementById('playerTier').textContent = d.player.tier;
      const badges = {pending:'pending',reviewed:'reviewed',accepted:'accepted',rejected:'rejected'};
      document.getElementById('playerStatus').innerHTML = `<span class="status-badge ${badges[d.player.status]||'pending'}">${d.player.status === 'pending' ? 'چاوەڕوانی' : d.player.status === 'reviewed' ? 'پێداچوونەوە' : d.player.status === 'accepted' ? 'قبوڵ کراو' : 'ڕەت کراو'}</span>`;
      document.getElementById('playerDate').textContent = new Date(d.player.created_at).toLocaleDateString('ku');
      nr.style.display = 'none';
      if (d.replies && d.replies.length > 0) {
        rs.style.display = 'block';
        document.getElementById('repliesList').innerHTML = d.replies.map(r => `<div class="reply-card"><span class="admin">${r.admin_name}</span><span class="date">${new Date(r.created_at).toLocaleDateString('ku')}</span><div class="msg">${r.message}</div></div>`).join('');
      } else rs.style.display = 'none';
    } else { pi.style.display = 'none'; rs.style.display = 'none'; nr.style.display = 'block'; }
  } catch { document.getElementById('noResult').textContent = 'هەڵەیەک ڕوویدا'; document.getElementById('noResult').style.display = 'block'; }
});
</script>
</body>
</html>
