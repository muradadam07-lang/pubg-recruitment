<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MASK TEAM - ڕیزبەندی تورنمنت</title>
<link rel="icon" type="image/svg+xml" href="/images/Mask.svg">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.liqui-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);margin-top:20px}
.liqui-table{width:100%;border-collapse:collapse;background:linear-gradient(180deg,rgba(26,26,40,0.95),rgba(15,15,30,0.98));font-size:0.85rem}
.liqui-table th{padding:12px 10px;text-align:center;background:rgba(0,0,0,0.4);border-bottom:2px solid var(--border);color:var(--text-secondary);font-weight:700;font-size:0.75rem}
.liqui-table td{padding:10px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04)}
.col-rank{width:50px}.col-team{text-align:right!important;min-width:130px}
.col-game{width:80px}.col-kills{width:60px}.col-total{width:80px}
.rank-num{display:inline-flex;width:28px;height:28px;align-items:center;justify-content:center;border-radius:50%;font-weight:900;font-size:0.85rem;background:rgba(255,255,255,0.05)}
.rank-num.rank-top{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.row-gold{background:rgba(255,215,0,0.06)!important}
.row-silver{background:rgba(192,192,192,0.04)!important}
.row-bronze{background:rgba(205,127,50,0.03)!important}
.team-name{font-weight:700;font-size:0.95rem;font-family:var(--font-display)}
.team-sub{font-size:0.72rem;color:var(--text-secondary);margin-top:3px}
.game-result{display:flex;flex-direction:column;align-items:center;gap:2px}
.g-placement{font-weight:900;font-size:0.85rem;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2px}
.p-1{background:linear-gradient(135deg,#ffd700,#ffed4a);color:#000}
.p-2{background:linear-gradient(135deg,#c0c0c0,#e8e8e8);color:#000}
.p-3{background:linear-gradient(135deg,#cd7f32,#daa06d);color:#000}
.p-4{background:rgba(0,255,136,0.15);color:#0f6}
.g-kills{font-size:0.7rem;color:#ff6b6b;font-weight:600}
.kills-num{font-weight:700;color:#ff6b6b;font-size:1rem}
.pts-num{font-weight:900;font-size:1.1rem;font-family:var(--font-display)}
.pts-num.pts-first{color:var(--accent)}
.bar-wrap{width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:5px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
</style>
</head>
<body>
<div id="canvas-container"></div>
<nav class="navbar"><div class="nav-container"><a href="/" class="nav-logo"><img src="/images/Mask.svg" alt="MASK TEAM"></a><ul class="nav-links"><li><a href="/">ماڵەوە</a></li><li><a href="/apply">داواکاری</a></li><li><a href="/calculate">حسابکەر</a></li><li><a href="/videos">ڤیدیۆ</a></li><li><a href="/staff">ستاف</a></li><li><a href="/status">باری داواکاری</a></li><li><a href="/login" class="nav-cta">چوونەژوورەوە</a></li></ul><button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button></div></nav>
<div class="nav-overlay" id="navOverlay"></div>
<div class="page-wrapper">
  <div class="section-header" style="padding-top:40px">
    <div class="results-badge">MASK TEAM PUBG</div>
    <h1 id="tournamentTitle"></h1>
    <p id="tournamentDesc" style="color:var(--text-secondary);font-size:0.9rem"></p>
    <div id="leaderboardContainer"></div>
  </div>
</div>
<footer class="footer"><p>© 2026 MASK TEAM</p></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/js/main.js"></script>
<script>
const tid = window.location.pathname.split('/').pop();
async function loadData() {
  try {
    const r = await fetch('/api/leaderboard/' + tid);
    const d = await r.json();
    if (!d.tournament) { document.getElementById('leaderboardContainer').innerHTML = '<p style="text-align:center;color:#ff6b6b">تورنمنت نەدۆزرایەوە</p>'; return; }
    document.getElementById('tournamentTitle').innerHTML = `🏆 ${d.tournament.name}`;
    document.getElementById('tournamentDesc').textContent = `ڕیزبەندی کۆتایی • ${d.leaderboard.length} تیم`;
    renderTable(d.leaderboard);
  } catch { document.getElementById('leaderboardContainer').innerHTML = '<p style="text-align:center;color:#ff6b6b">هەڵەیەک ڕوویدا</p>'; }
}
function renderTable(leaderboard) {
  if (!leaderboard || leaderboard.length === 0) { document.getElementById('leaderboardContainer').innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:30px">هیچ ئەنجامێک نییە</p>'; return; }
  const maxPts = Math.max(...leaderboard.map(x => x.total_points));
  const gc = Math.max(...leaderboard.map(x => x.games ? x.games.length : 1), 1);
  let html = '<div class="liqui-table-wrap"><table class="liqui-table"><thead><tr><th class="col-rank">#</th><th class="col-team">تیم</th>';
  for (let i = 0; i < gc; i++) html += `<th class="col-game">یاری ${i+1}</th>`;
  html += '<th class="col-kills">💀</th><th class="col-total">خاڵ</th></tr></thead><tbody>';
  leaderboard.forEach((t, i) => {
    const cls = i === 0 ? 'row-gold' : i === 1 ? 'row-silver' : i === 2 ? 'row-bronze' : '';
    const rc = i < 3 ? 'rank-top' : ''; const pc = i === 0 ? 'pts-first' : '';
    html += `<tr class="${cls}"><td class="col-rank"><span class="rank-num ${rc}">${i+1}</span></td>
      <td class="col-team"><div class="team-cell"><div class="team-name">${t.name}</div><div class="team-sub">${t.total_kills} kills • Best #${t.best_placement}</div></div></td>`;
    if (t.games && t.games.length > 0) { for (let g = 0; g < gc; g++) { const gg = t.games[g]; html += gg ? `<td class="col-game"><div class="game-result"><span class="g-placement p-${gg.placement}">${gg.placement}.</span><span class="g-kills">+${gg.kills}</span></div></td>` : '<td class="col-game">-</td>'; } }
    else { for (let g = 0; g < gc; g++) html += '<td class="col-game">-</td>'; }
    html += `<td class="col-kills"><span class="kills-num">${t.total_kills}</span></td>
      <td class="col-total"><span class="pts-num ${pc}">${t.total_points}</span><div class="bar-wrap"><div class="bar-fill" style="width:${maxPts ? (t.total_points/maxPts*100) : 0}%"></div></div></td></tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('leaderboardContainer').innerHTML = html;
}
loadData();
</script>
</body>
</html>
