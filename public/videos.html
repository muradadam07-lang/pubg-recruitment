<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MASK TEAM PUBG - گەڕانی ڤیدیۆ</title>
<link rel="icon" type="image/svg+xml" href="/images/Mask.svg">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:30px}
.video-card{background:rgba(26,26,40,0.8);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .3s,border-color .3s}
.video-card:hover{transform:translateY(-4px);border-color:var(--accent)}
.video-card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.video-info{padding:14px}
.video-info h4{margin:0 0 8px;font-size:0.95rem;line-height:1.4;font-family:var(--font-display)}
.video-info .author{color:var(--accent);font-size:0.8rem}
.video-info .meta{color:var(--text-secondary);font-size:0.78rem;margin-top:5px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{position:relative;width:90%;max-width:800px}
.modal-content iframe{width:100%;aspect-ratio:16/9;border-radius:12px;border:0}
.modal-close{position:absolute;top:-40px;right:0;color:#fff;font-size:1.8rem;cursor:pointer;background:none;border:none;padding:5px}
.search-box{display:flex;gap:10px;max-width:600px;margin:30px auto 0}
.search-box input{flex:1;padding:12px 18px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:#fff;font-family:inherit;font-size:1rem}
.search-box input:focus{outline:none;border-color:var(--accent)}
</style>
</head>
<body>
<div id="canvas-container"></div>
<nav class="navbar"><div class="nav-container"><a href="/" class="nav-logo"><img src="/images/Mask.svg" alt="MASK TEAM"></a><ul class="nav-links"><li><a href="/">ماڵەوە</a></li><li><a href="/apply">داواکاری</a></li><li><a href="/calculate">حسابکەر</a></li><li><a href="/videos">ڤیدیۆ</a></li><li><a href="/staff">ستاف</a></li><li><a href="/status">باری داواکاری</a></li><li><a href="/login" class="nav-cta">چوونەژوورەوە</a></li></ul><button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button></div></nav>
<div class="nav-overlay" id="navOverlay"></div>
<div class="page-wrapper">
  <div class="section-header" style="padding-top:40px">
    <div class="results-badge">YOUTUBE</div>
    <h1>گەڕانی <span class="accent">ڤیدیۆ</span></h1>
    <p>ڤیدیۆکانی PUBG بگەڕێ</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="گەڕان بۆ ڤیدیۆ..." onkeydown="if(event.key==='Enter') searchVideos()">
      <button class="btn btn-primary tilt-3d" onclick="searchVideos()">گەڕان</button>
    </div>
  </div>
  <div class="video-grid" id="videoGrid"></div>
  <p id="noResults" style="text-align:center;color:var(--text-secondary);margin-top:40px;display:none">هیچ ڤیدیۆیەک نەدۆزرایەوە</p>
</div>
<div class="modal" id="videoModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="playerContainer"></div>
  </div>
</div>
<footer class="footer"><p>© 2026 MASK TEAM</p></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/js/main.js"></script>
<script>
async function searchVideos() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-secondary)">گەڕان...</p>';
  try {
    const r = await fetch('/api/search-videos?q=' + encodeURIComponent(q));
    const d = await r.json();
    grid.innerHTML = '';
    if (d.results.length === 0) { document.getElementById('noResults').style.display = 'block'; return; }
    document.getElementById('noResults').style.display = 'none';
    d.results.forEach(v => {
      const card = document.createElement('div');
      card.className = 'video-card tilt-3d';
      card.innerHTML = `<img src="${v.thumbnail}" alt="" loading="lazy"><div class="video-info"><h4>${v.title}</h4><div class="author">${v.author}</div><div class="meta">${v.views ? Number(v.views).toLocaleString()+' بینین' : ''} ${v.timestamp ? '• '+v.timestamp : ''}</div></div>`;
      card.onclick = () => openPlayer(v.id);
      grid.appendChild(card);
    });
  } catch { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#ff6b6b">هەڵەیەک ڕوویدا</p>'; }
}
function openPlayer(id) {
  document.getElementById('videoModal').classList.add('active');
  document.getElementById('playerContainer').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
}
function closeModal() {
  document.getElementById('videoModal').classList.remove('active');
  document.getElementById('playerContainer').innerHTML = '';
}
</script>
</body>
</html>
