<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MASK TEAM - تورنمنتەکان</title>
<link rel="icon" type="image/svg+xml" href="/images/Mask.svg">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.tournaments-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:25px}
.tournament-card{background:rgba(26,26,40,0.8);border:1px solid var(--border);border-radius:12px;padding:22px;cursor:pointer;transition:transform .3s,border-color .3s}
.tournament-card:hover{transform:translateY(-3px);border-color:var(--accent)}
.tournament-card h3{margin:0 0 8px;font-family:var(--font-display);font-size:1.1rem}
.tournament-card .meta{color:var(--text-secondary);font-size:0.82rem;margin-bottom:8px}
.tournament-card .status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:700}
.status-active{background:rgba(25,135,84,0.15);color:#198754}
.status-finished{background:rgba(108,117,125,0.15);color:#6c757d}
.create-box{background:rgba(26,26,40,0.6);border:1px solid var(--border);border-radius:12px;padding:25px;margin-bottom:25px;max-width:500px}
.create-box .row{display:flex;gap:10px;margin-bottom:10px}
.create-box input,.create-box select{padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:#fff;font-family:inherit;font-size:0.9rem;flex:1}
.create-box input:focus,.create-box select:focus{outline:none;border-color:var(--accent)}
</style>
</head>
<body>
<div id="canvas-container"></div>
<nav class="navbar"><div class="nav-container"><a href="/" class="nav-logo"><img src="/images/Mask.svg" alt="MASK TEAM"></a><ul class="nav-links"><li><a href="/">ماڵەوە</a></li><li><a href="/apply">داواکاری</a></li><li><a href="/calculate">حسابکەر</a></li><li><a href="/videos">ڤیدیۆ</a></li><li><a href="/staff">ستاف</a></li><li><a href="/login" class="nav-cta">چوونەژوورەوە</a></li></ul><button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button></div></nav>
<div class="nav-overlay" id="navOverlay"></div>
<div class="page-wrapper">
  <div class="section-header" style="padding-top:30px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div><h1>🏆 <span class="accent">تورنمنتەکان</span></h1><p style="color:var(--text-secondary);margin:5px 0 0;font-size:0.85rem" id="adminName"></p></div>
      <div><a href="/dashboard" class="btn btn-secondary tilt-3d" style="font-size:0.85rem">← داشبۆرد</a></div>
    </div>
    <div class="create-box">
      <h4 style="margin-bottom:10px">دروستکردنی تورنمنتی نوێ</h4>
      <div class="row">
        <input type="text" id="tournamentName" placeholder="ناوی تورنمنت">
        <select id="gameCount"><option value="1">1 یاری</option><option value="2">2 یاری</option><option value="3">3 یاری</option><option value="4">4 یاری</option><option value="5">5 یاری</option><option value="6">6 یاری</option></select>
        <button class="btn btn-primary tilt-3d" onclick="createTournament()" style="font-size:0.85rem;white-space:nowrap">دروستکردن</button>
      </div>
    </div>
    <div class="tournaments-grid" id="tournamentsGrid"></div>
  </div>
</div>
<footer class="footer"><p>© 2026 MASK TEAM</p></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/js/main.js"></script>
<script>
async function loadTournaments() {
  try {
    const s = await (await fetch('/api/session')).json();
    if (!s.loggedIn) { window.location.href = '/login'; return; }
    document.getElementById('adminName').textContent = 'بەخێربێیت، ' + s.name;
    const r = await fetch('/api/tournaments');
    const d = await r.json();
    const grid = document.getElementById('tournamentsGrid');
    if (d.tournaments.length === 0) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-secondary);padding:40px">هیچ تورنمنتێک نەدۆزرایەوە</p>'; return; }
    grid.innerHTML = d.tournaments.map(t => `
      <div class="tournament-card tilt-3d" onclick="window.location.href='/dashboard/tournaments/${t.id}'">
        <h3>${t.name}</h3>
        <div class="meta">${t.game_count} یاری • ${t.team_count || 0} تیم • ${t.result_count || 0} ئەنجام</div>
        <span class="status status-${t.status}">${t.status === 'active' ? 'چالاک' : 'تەواو بوو'}</span>
      </div>`).join('');
  } catch { window.location.href = '/login'; }
}
async function createTournament() {
  const name = document.getElementById('tournamentName').value.trim();
  if (!name) return;
  await fetch('/api/tournaments', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, game_count: parseInt(document.getElementById('gameCount').value) }) });
  document.getElementById('tournamentName').value = '';
  loadTournaments();
}
loadTournaments();
</script>
</body>
</html>
