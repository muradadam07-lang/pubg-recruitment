<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MASK TEAM PUBG - حسابکەری خاڵ</title>
<link rel="icon" type="image/svg+xml" href="/images/Mask.svg">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.calc-panel{max-width:1000px;margin:30px auto;padding:0 20px}
.form-container.calc-form-glass{padding:30px;margin-bottom:30px;background:rgba(26,26,40,0.6);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(10px)}
.form-group textarea{width:100%;min-height:180px;padding:15px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;color:#fff;font-family:monospace;font-size:0.9rem;resize:vertical;line-height:1.6}
.form-group textarea:focus{outline:none;border-color:var(--accent)}
.liqui-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);margin-top:20px}
.liqui-table{width:100%;border-collapse:collapse;background:linear-gradient(180deg,rgba(26,26,40,0.95),rgba(15,15,30,0.98));font-size:0.85rem}
.liqui-table th{padding:12px 10px;text-align:center;background:rgba(0,0,0,0.4);border-bottom:2px solid var(--border);color:var(--text-secondary);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;font-size:0.75rem}
.liqui-table td{padding:10px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05)}
.col-rank{width:50px}.col-team{text-align:right!important;min-width:130px}
.col-game{width:90px}.col-kills{width:60px}.col-total{width:80px}
.rank-num{display:inline-flex;width:28px;height:28px;align-items:center;justify-content:center;border-radius:50%;font-weight:900;font-size:0.85rem;background:rgba(255,255,255,0.05)}
.rank-num.rank-top{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 8px rgba(255,215,0,0.3)}
.row-gold td{background:rgba(255,215,0,0.06)}
.row-silver td{background:rgba(192,192,192,0.05)}
.row-bronze td{background:rgba(205,127,50,0.04)}
.team-name{font-weight:700;font-size:0.95rem;font-family:var(--font-display)}
.team-sub{font-size:0.72rem;color:var(--text-secondary);margin-top:3px}
.game-result{display:flex;flex-direction:column;align-items:center;gap:2px}
.g-placement{font-weight:900;font-size:0.9rem;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2px}
.p-1{background:linear-gradient(135deg,#ffd700,#ffed4a);color:#000}
.p-2{background:linear-gradient(135deg,#c0c0c0,#e8e8e8);color:#000}
.p-3{background:linear-gradient(135deg,#cd7f32,#daa06d);color:#000}
.p-4{background:rgba(0,255,136,0.15);color:#0f6}
.p-5{background:rgba(0,255,136,0.1);color:#0f6}
.p-6,.p-7,.p-8{background:rgba(255,255,255,0.06);color:var(--text-secondary)}
.g-kills{font-size:0.7rem;color:#ff6b6b;font-weight:600}
.g-pts{font-size:0.68rem;color:var(--text-secondary)}
.kills-num{font-weight:700;color:#ff6b6b;font-size:1rem}
.pts-num{font-weight:900;font-size:1.1rem;font-family:var(--font-display)}
.pts-num.pts-first{color:var(--accent)}
.bar-wrap{width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:5px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .5s}
.total-bar{text-align:center;margin-bottom:15px}
.total-bar .label{color:var(--text-secondary);font-size:0.85rem}
.total-bar .value{font-family:var(--font-display);font-size:1.8rem;font-weight:900;color:var(--accent)}
@media(max-width:600px){.liqui-table{font-size:0.75rem}.liqui-table td,.liqui-table th{padding:6px 4px}.col-team{min-width:100px}.col-game{width:60px}.g-placement{width:22px;height:22px;font-size:0.75rem}}
</style>
</head>
<body>
<div id="canvas-container"></div>
<nav class="navbar"><div class="nav-container"><a href="/" class="nav-logo"><img src="/images/Mask.svg" alt="MASK TEAM"></a><ul class="nav-links"><li><a href="/">ماڵەوە</a></li><li><a href="/apply">داواکاری</a></li><li><a href="/calculate">حسابکەر</a></li><li><a href="/videos">ڤیدیۆ</a></li><li><a href="/staff">ستاف</a></li><li><a href="/status">باری داواکاری</a></li><li><a href="/login" class="nav-cta">چوونەژوورەوە</a></li></ul><button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button></div></nav>
<div class="nav-overlay" id="navOverlay"></div>
<div class="page-wrapper">
  <div class="section-header" style="padding-top:40px">
    <div class="results-badge">PUBG TOURNAMENT CALCULATOR</div>
    <h1>حسابکەری <span class="accent">ئەنجامەکان</span></h1>
    <p>داونیشانی ئەنجامەکان بکە و خاڵەکانت ببینە - خۆکارانە حساب دەکرێت</p>
  </div>
  <div class="calc-panel">
    <div id="scoringStrip" style="background:rgba(26,26,40,0.6);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:12px;padding:14px 20px;margin-bottom:24px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;font-size:0.85rem">
      <span style="display:flex;align-items:center;gap:4px">🥇 <span style="color:var(--text-secondary)">1st</span> <strong style="color:var(--accent)">10pts</strong></span>
      <span style="display:flex;align-items:center;gap:4px">🥈 <span style="color:var(--text-secondary)">2nd</span> <strong style="color:var(--accent)">6pts</strong></span>
      <span style="display:flex;align-items:center;gap:4px">🥉 <span style="color:var(--text-secondary)">3rd</span> <strong style="color:var(--accent)">5pts</strong></span>
      <span style="display:flex;align-items:center;gap:4px;color:var(--text-secondary)">4th <strong style="color:var(--accent)">4</strong></span>
      <span style="display:flex;align-items:center;gap:4px;color:var(--text-secondary)">5th <strong style="color:var(--accent)">3</strong></span>
      <span style="display:flex;align-items:center;gap:4px;color:var(--text-secondary)">6th <strong style="color:var(--accent)">2</strong></span>
      <span style="display:flex;align-items:center;gap:4px;color:var(--text-secondary)">7th <strong style="color:var(--accent)">1</strong></span>
      <span style="display:flex;align-items:center;gap:4px;color:var(--text-secondary)">8th <strong style="color:var(--accent)">1</strong></span>
      <span style="display:flex;align-items:center;gap:4px">💀 <span style="color:var(--text-secondary)">Kill</span> <strong style="color:var(--accent)">1pt</strong></span>
    </div>
    <div class="form-container calc-form-glass">
      <form id="calcForm">
        <div class="form-group">
          <label style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
            <span>داونیشانی ئەنجامەکان</span>
            <span style="color:var(--text-secondary);font-size:0.8rem">فۆرمات: IGN (TOP#) (TOP#) kill (K1-K2)</span>
          </label>
          <textarea name="data" id="dataInput" placeholder="MASKx (TOP1) (TOP3) kill (8-5)&#10;Force (TOP2) (TOP5) kill (4-6)"></textarea>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button type="submit" class="btn btn-primary tilt-3d">حسابکردن</button>
          <button type="button" class="btn btn-secondary tilt-3d" onclick="downloadPNG()" id="dlBtn" style="display:none">⬇ داونلۆدی وێنە</button>
        </div>
      </form>
    </div>
    <div id="results"></div>
  </div>
</div>
<footer class="footer"><p>© 2026 MASK TEAM</p></footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="/js/main.js"></script>
<script>
document.getElementById('calcForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const data = document.getElementById('dataInput').value;
  try {
    const r = await fetch('/api/calculate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ data }) });
    const d = await r.json();
    renderResults(d);
  } catch { document.getElementById('results').innerHTML = '<p style="text-align:center;color:#ff6b6b">هەڵەیەک ڕوویدا</p>'; }
});
function renderResults(d) {
  const el = document.getElementById('results');
  if (!d.leaderboard || d.leaderboard.length === 0) { el.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:30px 0">هیچ تیمێک نەدۆزرایەوە. دەقەکە ڕاست بکەوە و هەوڵبدەوە.</p>'; document.getElementById('dlBtn').style.display = 'none'; return; }
  const maxPts = Math.max(...d.leaderboard.map(x => x.totalPoints));
  const gameCount = d.leaderboard[0].games.length;
  let html = `<div style="background:rgba(26,26,40,0.4);border-radius:12px;padding:20px;margin-bottom:20px;text-align:center"><div style="color:var(--text-secondary);font-size:0.85rem">کۆی گشتی خاڵەکان</div><div style="font-family:var(--font-display);font-size:2.5rem;font-weight:900;color:var(--accent)">${d.totalScore}</div></div>`;
  html += `<div class="liqui-table-wrap" id="capture"><table class="liqui-table"><thead><tr>
    <th class="col-rank">#</th><th class="col-team">تیم</th>`;
  for (let i = 0; i < gameCount; i++) html += `<th class="col-game">یاری ${i+1}</th>`;
  html += `<th class="col-kills">💀</th><th class="col-total">خاڵ</th></tr></thead><tbody>`;
  d.leaderboard.forEach((t, i) => {
    const cls = i === 0 ? 'row-gold' : i === 1 ? 'row-silver' : i === 2 ? 'row-bronze' : '';
    const rankCls = i < 3 ? 'rank-top' : '';
    const ptsCls = i === 0 ? 'pts-first' : '';
    html += `<tr class="liqui-row ${cls}"><td class="col-rank"><span class="rank-num ${rankCls}">${i+1}</span></td>
      <td class="col-team"><div class="team-cell"><div class="team-name">${t.name}</div><div class="team-sub">${t.totalKills} kills • Best #${t.bestPlace}</div></div></td>`;
    t.games.forEach(g => {
      html += `<td class="col-game"><div class="game-result"><span class="g-placement p-${g.placement}">${g.placement}.</span><span class="g-kills">+${g.kills}</span><span class="g-pts">${g.points}</span></div></td>`;
    });
    html += `<td class="col-kills"><span class="kills-num">${t.totalKills}</span></td>
      <td class="col-total"><span class="pts-num ${ptsCls}">${t.totalPoints}</span><div class="bar-wrap"><div class="bar-fill" style="width:${(t.totalPoints/maxPts*100)}%"></div></div></td></tr>`;
  });
  html += '</tbody></table></div>';
  el.innerHTML = html;
  document.getElementById('dlBtn').style.display = 'inline-block';
}
async function downloadPNG() {
  const el = document.getElementById('capture');
  if (!el) return;
  try {
    const c = await html2canvas(el, { backgroundColor: '#1a1a28', scale: 2, useCORS: true });
    const a = document.createElement('a');
    a.download = 'leaderboard.png';
    a.href = c.toDataURL('image/png');
    a.click();
  } catch {}
}
</script>
</body>
</html>
